# 生产/发布用：使用已构建的镜像（由 CI 推送到 GHCR），支持版本与回滚
#
# 用法（叠加在 docker-compose.yml 之上，覆盖 build 为 image）：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 回滚：修改 .env 中 IMAGE_TAG 为上一版本号，重新 up -d
# 数据库备份：docker exec AI_Quote_DB pg_dump -U $POSTGRES_USER $POSTGRES_DB > backup.sql
services:
  postgres:
    restart: always
    # 生产环境：不暴露数据库端口到宿主机，仅 Docker 内部网络可访问
    ports: !reset []
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    volumes:
      - ai_quote_pgdata:/var/lib/postgresql/data
      - ai_quote_backup:/backup

  backend:
    image: ${GHCR_IMAGE_BACKEND:-ghcr.io/zeeeelatan/ai-quote-backend}:${IMAGE_TAG:-latest}
    container_name: AI_Quote_Backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:?请在 .env 中设置 POSTGRES_DB}
      DB_USER: ${POSTGRES_USER:?请在 .env 中设置 POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?请在 .env 中设置 JWT_SECRET_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_QUOTE_MODEL: ${OLLAMA_QUOTE_MODEL:-qwen:latest}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - ai_quote_net

  frontend:
    image: ${GHCR_IMAGE_FRONTEND:-ghcr.io/zeeeelatan/ai-quote-frontend}:${IMAGE_TAG:-latest}
    container_name: AI_Quote_Frontend
    restart: always
    # 生产环境：映射到 8080，由宿主机 nginx 反向代理
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - ai_quote_net

  ollama:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  ai_quote_pgdata:
  ai_quote_backup:
  ai_quote_ollama:

networks:
  ai_quote_net:
    name: ai_quote_net
    driver: bridge
