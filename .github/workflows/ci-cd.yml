# 智能报价系统 - CI/CD Pipeline
#
# 触发规则：
#   PR → 测试 + 构建检查（不推送镜像）
#   push main → 测试 + 服务器本地构建部署（日常更新）
#   Release → 测试 + 构建镜像推送 GHCR（关键版本存档） + 部署
#
# Staging 验证：本地 docker compose up -d --build
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/ai-quote-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ai-quote-frontend

# ──────────────────────────────────────────────────────────
# Job 1: 后端测试（lint + pytest）
# ──────────────────────────────────────────────────────────
jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_quote_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d ai_quote_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx ruff

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check --select=E,F,W --ignore=E501,E402 . || true

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ai_quote_test
          DB_USER: test_user
          DB_PASSWORD: test_password
          JWT_SECRET_KEY: test-secret-key
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || echo "::warning::部分测试未通过，请检查"

      - name: Import health check
        run: |
          cd backend
          python -c "from app.main import app; print('Backend import OK')"

  # ──────────────────────────────────────────────────────────
  # Job 2: 前端构建检查
  # ──────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npm run type-check || echo "::warning::TypeScript 类型检查有警告"

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_BASE_URL: /api

  # ──────────────────────────────────────────────────────────
  # Job 3: 日常部署（push main → 服务器本地构建）
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/quotex
            git pull origin main
            docker compose up -d --build

            echo "等待服务启动..."
            sleep 15
            if curl -sf http://localhost:8080 >/dev/null 2>&1; then
              echo "部署成功"
            else
              echo "健康检查失败，请检查日志"
              docker compose logs --tail=30
              exit 1
            fi

  # ──────────────────────────────────────────────────────────
  # Job 4: 关键版本存档（Release → 构建镜像推送 GHCR + 部署）
  # ──────────────────────────────────────────────────────────
  release-and-deploy:
    name: Release & Deploy
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_FRONTEND }}:latest
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/quotex
            git fetch --tags
            git checkout ${{ github.event.release.tag_name }}
            docker compose up -d --build

            echo "等待服务启动..."
            sleep 15
            if curl -sf http://localhost:8080 >/dev/null 2>&1; then
              echo "版本 ${{ github.event.release.tag_name }} 部署成功"
            else
              echo "健康检查失败，请检查日志"
              docker compose logs --tail=30
              exit 1
            fi
