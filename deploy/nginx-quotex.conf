# QuoteX 智能报价系统 - 宿主机 nginx 反向代理配置
#
# 使用方法：
#   1. 复制到 nginx 配置目录：
#      sudo cp deploy/nginx-quotex.conf /etc/nginx/sites-available/quotex
#   2. 修改 server_name 为你的实际域名
#   3. 启用站点：
#      sudo ln -s /etc/nginx/sites-available/quotex /etc/nginx/sites-enabled/quotex
#   4. 检查并重载：
#      sudo nginx -t && sudo systemctl reload nginx
#
# 架构说明：
#   浏览器 → 宿主机 nginx (:80) → Docker AI_Quote_Frontend (:8080)
#                                       → Docker 内部 nginx → AI_Quote_Backend (:5002)
#
# 与现有系统共存：
#   宿主机 nginx 通过 server_name 区分不同系统
#   - 现有系统：server_name existing.example.com → pm2 应用
#   - QuoteX：  server_name quote.example.com   → Docker 容器

server {
    listen 80;
    server_name quote.example.com;  # ← 修改为你的实际子域名

    # 客户端上传文件大小限制（Excel 导入等场景需要）
    client_max_body_size 50M;

    # 所有请求转发到 Docker 前端容器
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（AI 报价生成、大文件解析可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 健康检查端点（供外部监控使用）
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ─── 可选：HTTPS 配置（使用 certbot 自动生成后会追加到此文件） ───
# 安装 certbot：sudo apt install certbot python3-certbot-nginx
# 申请证书：  sudo certbot --nginx -d quote.example.com
# 自动续期：  certbot 安装后自动配置 systemd timer
