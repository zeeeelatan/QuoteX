# Alembic 配置文件
# 实际数据库 URL 由 alembic/env.py 从环境变量读取，此处仅为占位

[alembic]
script_location = alembic
prepend_sys_path = .

# 占位 URL，运行时由 env.py 覆盖
sqlalchemy.url = postgresql+psycopg2://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
